name: Scrape Call4Paper
on:
  schedule:
    - cron: '15 6 * * *'
  workflow_dispatch:
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    - run: pip install requests beautifulsoup4
    - run: python scraper.py call4paper
    - name: Commit if changed
      run: |
        git config user.name "AIdeaText Bot"
        git config user.email "actions@users.noreply.github.com"
        git add data/call4paper.json
        git diff --staged --quiet || git commit -m "call4paper: $(date -u '+%Y-%m-%d %H:%M UTC')"
        git push
